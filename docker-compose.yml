services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_video_pipeline
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/ai_video_pipeline?schema=public"
      AUTH_SECRET: "${AUTH_SECRET:-change-me-in-production}"
      CLAUDE_API_KEY: "${CLAUDE_API_KEY:-}"
      JIMENG_API_KEY: "${JIMENG_API_KEY:-}"
      KLING_API_KEY: "${KLING_API_KEY:-}"
      TTS_API_KEY: "${TTS_API_KEY:-}"
      DOUYIN_CLIENT_ID: "${DOUYIN_CLIENT_ID:-}"
      DOUYIN_CLIENT_SECRET: "${DOUYIN_CLIENT_SECRET:-}"
      KUAISHOU_CLIENT_ID: "${KUAISHOU_CLIENT_ID:-}"
      KUAISHOU_CLIENT_SECRET: "${KUAISHOU_CLIENT_SECRET:-}"
      APP_URL: "${APP_URL:-http://localhost:3000}"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        npx prisma migrate deploy &&
        npx prisma db seed &&
        node server.js
      "

volumes:
  pgdata:
